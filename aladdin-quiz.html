<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>アラジンクイズ</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --gold: #d4a017;
  --gold-light: #f5d76e;
  --gold-glow: #fceabb;
  --purple-deep: #1a0a3e;
  --purple: #4c1d95;
  --purple-mid: #7c3aed;
  --purple-light: #c4b5fd;
  --purple-bg: #ede9fe;
  --blue-magic: #2563eb;
  --teal: #0d9488;
  --sand: #fef3c7;
  --sand-dark: #f59e0b;
  --text: #1e1b4b;
  --text-light: #6d63a8;
  --bg: #f5f0ff;
  --card-bg: rgba(255,255,255,0.95);
  --card-shadow: 0 4px 28px rgba(76, 29, 149, 0.15);
  --green: #22c55e;
  --green-bg: #dcfce7;
  --red: #ef4444;
  --red-bg: #fee2e2;
}

html, body {
  height: 100%;
  overflow: hidden;
  font-family: -apple-system, 'Hiragino Sans', 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
  background: var(--bg);
  color: var(--text);
  -webkit-tap-highlight-color: transparent;
  -webkit-user-select: none;
  user-select: none;
}

body {
  padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  background: linear-gradient(170deg, #0f0628 0%, #1a0a3e 30%, #2d1b69 60%, #1a0a3e 100%);
  min-height: 100vh;
  min-height: 100dvh;
}

.screen {
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height: 100vh;
  height: 100dvh;
  padding: 24px;
  animation: fadeIn 0.5s ease;
}
.screen.active { display: flex; }

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}

/* ── Stars BG ── */
.stars {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}
.star {
  position: absolute;
  width: 3px;
  height: 3px;
  background: #fff;
  border-radius: 50%;
  animation: twinkle 2s ease-in-out infinite alternate;
}
@keyframes twinkle {
  from { opacity: 0.2; }
  to { opacity: 1; }
}

/* ── Start Screen ── */
#start-screen { gap: 20px; text-align: center; position: relative; z-index: 1; }

#start-screen h1 {
  font-size: 2.6rem;
  color: var(--gold-light);
  letter-spacing: 0.06em;
  text-shadow: 0 2px 20px rgba(245, 215, 110, 0.4);
}

#start-screen .subtitle {
  font-size: 1.15rem;
  color: var(--purple-light);
  line-height: 1.8;
}

.btn {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 16px 48px;
  border: none;
  border-radius: 16px;
  font-size: 1.3rem;
  font-weight: 700;
  cursor: pointer;
  transition: transform 0.15s, box-shadow 0.15s;
  -webkit-tap-highlight-color: transparent;
  position: relative;
  z-index: 1;
}
.btn:active { transform: scale(0.96); }

.btn-primary {
  background: linear-gradient(135deg, var(--gold), #b8860b);
  color: #1a0a3e;
  box-shadow: 0 4px 20px rgba(212, 160, 23, 0.4);
  text-shadow: none;
}

.btn-map {
  background: rgba(255,255,255,0.95);
  color: var(--blue-magic);
  border: 2px solid #93c5fd;
  font-size: 1.1rem;
  padding: 12px 28px;
  border-radius: 12px;
  text-decoration: none;
  margin-top: 4px;
}

/* ── Quiz Screen ── */
#quiz-screen {
  justify-content: flex-start;
  padding: 20px 24px;
  gap: 0;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  position: relative;
  z-index: 1;
}

.progress-bar {
  width: 100%;
  max-width: 640px;
  height: 10px;
  background: rgba(255,255,255,0.15);
  border-radius: 5px;
  overflow: hidden;
  flex-shrink: 0;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--gold), var(--gold-light));
  border-radius: 5px;
  transition: width 0.5s ease;
}

.progress-text {
  font-size: 1rem;
  color: var(--purple-light);
  margin-top: 8px;
  flex-shrink: 0;
}

.quiz-card {
  width: 100%;
  max-width: 640px;
  background: var(--card-bg);
  border-radius: 24px;
  box-shadow: var(--card-shadow);
  padding: 24px 22px 22px;
  margin-top: 14px;
  display: flex;
  flex-direction: column;
  gap: 16px;
  border: 1.5px solid rgba(196, 181, 253, 0.3);
}

.quiz-category {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  padding: 6px 16px;
  border-radius: 20px;
  font-size: 0.95rem;
  font-weight: 700;
  align-self: flex-start;
}
.cat-story { background: #fce7f3; color: #be185d; }
.cat-character { background: #e0f2fe; color: #0369a1; }
.cat-music { background: #fef3c7; color: #b45309; }
.cat-stage { background: #f3e8ff; color: #7c3aed; }
.cat-trivia { background: #d1fae5; color: #065f46; }

.quiz-svg {
  display: flex;
  justify-content: center;
  align-items: center;
}
.quiz-svg svg {
  width: 200px;
  height: 130px;
}

.quiz-question {
  font-size: 1.3rem;
  font-weight: 700;
  line-height: 1.6;
  color: var(--text);
}

.choices {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

.choice-btn {
  padding: 16px 12px;
  border: 2.5px solid var(--purple-light);
  border-radius: 16px;
  background: var(--purple-bg);
  font-size: 1.15rem;
  font-weight: 600;
  color: var(--text);
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s, transform 0.15s;
  text-align: center;
  line-height: 1.4;
}
.choice-btn:active { transform: scale(0.97); }
.choice-btn.correct {
  border-color: var(--green);
  background: var(--green-bg);
  animation: popCorrect 0.4s ease;
}
.choice-btn.wrong {
  border-color: var(--red);
  background: var(--red-bg);
  animation: shake 0.4s ease;
}
.choice-btn.reveal-correct {
  border-color: var(--green);
  background: var(--green-bg);
}
.choice-btn.disabled {
  pointer-events: none;
  opacity: 0.6;
}
.choice-btn.disabled.correct,
.choice-btn.disabled.reveal-correct { opacity: 1; }

@keyframes popCorrect {
  0% { transform: scale(1); }
  40% { transform: scale(1.06); }
  100% { transform: scale(1); }
}
@keyframes shake {
  0%, 100% { transform: translateX(0); }
  20% { transform: translateX(-6px); }
  40% { transform: translateX(6px); }
  60% { transform: translateX(-4px); }
  80% { transform: translateX(4px); }
}

.explanation {
  display: none;
  background: linear-gradient(135deg, #fefce8, #fef9c3);
  border: 2px solid var(--gold-light);
  border-radius: 16px;
  padding: 18px 16px;
  font-size: 1.1rem;
  line-height: 1.65;
  color: var(--text);
  animation: fadeIn 0.35s ease;
}
.explanation.show { display: block; }

.explanation .result-label {
  font-weight: 800;
  font-size: 1.15rem;
  margin-bottom: 6px;
}
.explanation .result-label.correct-label { color: var(--green); }
.explanation .result-label.wrong-label { color: var(--red); }

.next-area {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 10px;
  margin-top: 4px;
}

/* ── Result Screen ── */
#result-screen {
  gap: 20px;
  text-align: center;
  position: relative;
  z-index: 1;
}

.result-score {
  font-size: 4rem;
  font-weight: 900;
  color: var(--gold-light);
  text-shadow: 0 2px 16px rgba(245,215,110,0.4);
}
.result-score span { font-size: 1.8rem; }

.result-msg {
  font-size: 1.3rem;
  color: var(--purple-light);
  line-height: 1.6;
}

.result-detail {
  width: 100%;
  max-width: 480px;
  display: flex;
  flex-wrap: wrap;
  justify-content: center;
  gap: 10px;
  margin: 8px 0;
}
.result-dot {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-weight: 800;
  font-size: 1rem;
  color: #fff;
}
.result-dot.ok { background: var(--green); }
.result-dot.ng { background: var(--red); }

/* ── Overlay flash ── */
.flash-overlay {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 100;
  opacity: 0;
}
.flash-overlay.flash-green {
  background: radial-gradient(circle, rgba(34,197,94,0.3) 0%, transparent 70%);
  animation: flash 0.6s ease;
}
.flash-overlay.flash-red {
  background: radial-gradient(circle, rgba(239,68,68,0.25) 0%, transparent 70%);
  animation: flash 0.6s ease;
}
@keyframes flash {
  0% { opacity: 0; }
  30% { opacity: 1; }
  100% { opacity: 0; }
}

/* ── Magic sparkle ── */
.sparkle {
  position: fixed;
  pointer-events: none;
  z-index: 200;
  animation: sparkleFly 1s ease forwards;
}
@keyframes sparkleFly {
  0% { transform: translateY(0) scale(1) rotate(0deg); opacity: 1; }
  100% { transform: translateY(-60px) scale(0) rotate(360deg); opacity: 0; }
}

/* ── Confetti ── */
.confetti-piece {
  position: fixed;
  border-radius: 2px;
  z-index: 200;
  pointer-events: none;
  animation: confettiFall 1.2s ease forwards;
}
@keyframes confettiFall {
  0% { transform: translateY(0) rotate(0deg); opacity: 1; }
  100% { transform: translateY(80vh) rotate(720deg); opacity: 0; }
}

@media (max-width: 600px) {
  .choices { grid-template-columns: 1fr; }
  .quiz-question { font-size: 1.15rem; }
  #start-screen h1 { font-size: 2rem; }
  .quiz-svg svg { width: 160px; height: 110px; }
}
</style>
</head>

const prefixes = ['A.', 'B.', 'C.', 'D.'];
let current = 0;
let score = 0;
let results = [];

function catClass(cat) {
  return { story:'cat-story', character:'cat-character', music:'cat-music', stage:'cat-stage', trivia:'cat-trivia' }[cat];
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function startQuiz() {
  current = 0; score = 0; results = [];
  showScreen('quiz-screen');
  renderQuestion();
}

function renderQuestion() {
  const q = quizzes[current];
  document.getElementById('progress-fill').style.width = ((current) / quizzes.length * 100) + '%';
  document.getElementById('progress-text').textContent = `第${current+1}問 / 全${quizzes.length}問`;

  document.getElementById('quiz-cat').className = 'quiz-category ' + catClass(q.cat);
  document.getElementById('quiz-cat').textContent = q.catLabel;
  document.getElementById('quiz-svg').innerHTML = svgIllustrations[q.svg];
  document.getElementById('quiz-question').textContent = q.q;

  const choicesEl = document.getElementById('choices');
  choicesEl.innerHTML = '';
  q.choices.forEach((c, i) => {
    const btn = document.createElement('button');
    btn.className = 'choice-btn';
    btn.textContent = prefixes[i] + ' ' + c;
    btn.onclick = () => selectAnswer(i);
    choicesEl.appendChild(btn);
  });

  document.getElementById('explanation').classList.remove('show');
  document.getElementById('explanation').innerHTML = '';
  document.getElementById('next-area').style.display = 'none';
  document.getElementById('next-area').innerHTML = '';
  document.getElementById('quiz-screen').scrollTop = 0;
}

function selectAnswer(idx) {
  const q = quizzes[current];
  const btns = document.querySelectorAll('.choice-btn');
  const correct = idx === q.answer;
  const flash = document.getElementById('flash');

  btns.forEach((b, i) => {
    b.classList.add('disabled');
    if (i === q.answer) b.classList.add(correct ? 'correct' : 'reveal-correct');
    if (i === idx && !correct) b.classList.add('wrong');
  });

  if (correct) {
    score++;
    results.push(true);
    flash.className = 'flash-overlay flash-green';
    spawnMagicSparkles();
  } else {
    results.push(false);
    flash.className = 'flash-overlay flash-red';
  }
  setTimeout(() => flash.className = 'flash-overlay', 700);

  const expEl = document.getElementById('explanation');
  let html = `<div class="result-label ${correct ? 'correct-label' : 'wrong-label'}">${correct ? '⭕ 正解！' : '❌ 残念…'}</div>`;
  html += `<p>${q.explain}</p>`;
  expEl.innerHTML = html;
  expEl.classList.add('show');

  const nextArea = document.getElementById('next-area');
  nextArea.style.display = 'flex';
  if (current < quizzes.length - 1) {
    nextArea.innerHTML = `<button class="btn btn-primary" onclick="nextQuestion()">次の問題へ →</button>`;
  } else {
    nextArea.innerHTML = `<button class="btn btn-primary" onclick="showResult()">結果を見る</button>`;
  }
}

function nextQuestion() {
  current++;
  renderQuestion();
}

function showResult() {
  document.getElementById('progress-fill').style.width = '100%';
  showScreen('result-screen');

  document.getElementById('result-score').innerHTML = `${score}<span> / ${quizzes.length}</span>`;

  const pct = score / quizzes.length;
  let msg = '';
  if (pct === 1) msg = 'パーフェクト！アラジンマスター！';
  else if (pct >= 0.8) msg = 'すごい！ジーニーもビックリ！';
  else if (pct >= 0.6) msg = 'いい感じ！舞台を観たらもっとわかるよ！';
  else if (pct >= 0.4) msg = 'まだまだこれから！舞台で確かめよう！';
  else msg = '舞台を観たらきっと全問正解できるよ！';
  document.getElementById('result-msg').textContent = msg;

  const detail = document.getElementById('result-detail');
  detail.innerHTML = '';
  results.forEach((r, i) => {
    const d = document.createElement('div');
    d.className = 'result-dot ' + (r ? 'ok' : 'ng');
    d.textContent = 'Q' + (i + 1);
    detail.appendChild(d);
  });

  if (pct >= 0.7) spawnConfetti(50);
}

function spawnMagicSparkles(count = 15) {
  const colors = ['#f5d76e','#c084fc','#a78bfa','#fbbf24','#fff'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'sparkle';
    el.style.left = (30 + Math.random() * 40) + 'vw';
    el.style.top = (30 + Math.random() * 40) + 'vh';
    el.style.animationDelay = Math.random() * 0.4 + 's';
    el.style.animationDuration = (0.6 + Math.random() * 0.6) + 's';
    const c = colors[Math.floor(Math.random() * colors.length)];
    el.innerHTML = `<svg width="16" height="16" viewBox="0 0 16 16"><path d="M8 0 L9.5 6.5 L16 8 L9.5 9.5 L8 16 L6.5 9.5 L0 8 L6.5 6.5Z" fill="${c}"/></svg>`;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1500);
  }
}

function spawnConfetti(count = 30) {
  const colors = ['#f5d76e','#c084fc','#7c3aed','#fbbf24','#0ea5e9','#22c55e','#fb7185'];
  for (let i = 0; i < count; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.animationDelay = Math.random() * 0.6 + 's';
    el.style.animationDuration = (0.8 + Math.random() * 1) + 's';
    const sz = 6 + Math.random() * 8;
    el.style.width = sz + 'px'; el.style.height = sz + 'px';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2500);
  }
}
